name: Build and Release Parsers

on:
  push:

permissions:
  contents: write


jobs:
  build:
    name: Build ${{ matrix.grammar.lang }} on ${{ matrix.os_config.os_name }}
    runs-on: ${{ matrix.os_config.os }}
    strategy:
      # fail-fast: false ensures that if one language fails, the others keep building
      fail-fast: false
      matrix:
        # 1. The exact languages and their official/community repository paths
        grammar:
          - { lang: json,       repo: "tree-sitter/tree-sitter-json" }
          - { lang: python,     repo: "tree-sitter/tree-sitter-python" }
          - { lang: javascript, repo: "tree-sitter/tree-sitter-javascript" }
          - { lang: typescript, repo: "tree-sitter/tree-sitter-typescript" }
          - { lang: rust,       repo: "tree-sitter/tree-sitter-rust" }
          - { lang: go,         repo: "tree-sitter/tree-sitter-go" }
          - { lang: java,       repo: "tree-sitter/tree-sitter-java" }
          - { lang: c,          repo: "tree-sitter/tree-sitter-c" }
          - { lang: cpp,        repo: "tree-sitter/tree-sitter-cpp" }
          - { lang: yaml,       repo: "tree-sitter-grammars/tree-sitter-yaml" }
          - { lang: toml,       repo: "tree-sitter-grammars/tree-sitter-toml" }
          - { lang: xml,        repo: "tree-sitter-grammars/tree-sitter-xml" }
          - { lang: html,       repo: "tree-sitter/tree-sitter-html" }
          - { lang: css,        repo: "tree-sitter/tree-sitter-css" }
          - { lang: sql,        repo: "m-novikov/tree-sitter-sql" }
          - { lang: dockerfile, repo: "camdencheek/tree-sitter-dockerfile" }
          - { lang: graphql,    repo: "bkegley/tree-sitter-graphql" }
          - { lang: markdown,   repo: "tree-sitter-grammars/tree-sitter-markdown" }

        # 2. The OS configurations
        os_config:
          - { os: ubuntu-latest, os_name: linux,   ext: so,    compiler: gcc,   flags: "-shared -fPIC -O2" }
          - { os: macos-latest,  os_name: macos,   ext: dylib, compiler: clang, flags: "-dynamiclib -O2" }
          - { os: windows-latest,os_name: windows, ext: dll,   compiler: gcc,   flags: "-shared -O2" }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Clone the repository using the explicit 'repo' path from the matrix
      - name: Clone Language Grammar
        run: git clone https://github.com/${{ matrix.grammar.repo }}.git repo-dir

      # Compile the parser, handling sub-folders and custom scanners
      - name: Compile Parser
        shell: bash
        run: |
          cd repo-dir
          
          # Default source directory
          SRC_DIR="src"
          
          # Custom routing for repos that hide their code in sub-folders
          if [ "${{ matrix.grammar.lang }}" == "typescript" ]; then
            SRC_DIR="typescript/src"
          elif [ "${{ matrix.grammar.lang }}" == "markdown" ]; then
            SRC_DIR="tree-sitter-markdown/src"
          elif [ "${{ matrix.grammar.lang }}" == "xml" ]; then
            SRC_DIR="xml/src"
          fi
          
          # Start building the compile command using the routed SRC_DIR
          CMD="${{ matrix.os_config.compiler }} ${{ matrix.os_config.flags }} -I./$SRC_DIR $SRC_DIR/parser.c"
          
          # If the language uses a C scanner, add it to the command
          if [ -f "$SRC_DIR/scanner.c" ]; then
            echo "Found scanner.c, adding to build..."
            CMD="$CMD $SRC_DIR/scanner.c"
          fi
          
          # If the language uses a C++ scanner, add it and link the C++ standard library
          if [ -f "$SRC_DIR/scanner.cc" ]; then
            echo "Found scanner.cc, adding to build..."
            CMD="$CMD $SRC_DIR/scanner.cc -lstdc++"
          fi
          
          # Define the final output file name
          OUTPUT_FILE="../tree-sitter-${{ matrix.grammar.lang }}.${{ matrix.os_config.ext }}"
          CMD="$CMD -o $OUTPUT_FILE"
          
          echo "Executing: $CMD"
          eval $CMD

      # Upload the finished file to your GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest Parsers"
          prerelease: true
          files: tree-sitter-${{ matrix.language }}.${{ matrix.os_config.ext }}
      
